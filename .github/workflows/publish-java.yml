name: Build and Publish Java Library

on:
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '11'
          cache: maven
      - name: Set release version
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          mvn -B -f pom.xml versions:set -DnewVersion="$TAG" -DgenerateBackupPoms=false
      - name: Package
        run: mvn -B -f pom.xml package
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
      - name: Publish to GitHub Packages
        if: github.event_name == 'release'
        run: mvn -B -f pom.xml deploy --settings .github/maven-settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
